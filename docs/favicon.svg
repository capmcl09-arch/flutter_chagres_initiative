<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="192" height="192">
  <!-- Circular background -->
  <circle cx="100" cy="100" r="95" fill="#0051BA" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  
  <!-- Water wave elements representing river/waterway -->
  <path d="M 60 120 Q 70 115, 80 120 T 100 120 T 120 120 T 140 120" 
        stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 55 135 Q 65 130, 75 135 T 95 135 T 115 135 T 135 135 T 155 135" 
        stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Mountain/landscape element -->
  <polygon points="65,130 100,75 135,130" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Central point/circle -->
  <circle cx="100" cy="75" r="5" fill="#FFFFFF"/>
</svg>
